  <circle cx="100" cy="55" r="2.5" fill="#00BFFF" opacity="0.9" />
  <circle cx="75" cy="85" r="2" fill="#00D4FF" opacity="0.8" />
  <circle cx="125" cy="85" r="2" fill="#00D4FF" opacity="0.8" />
  <circle cx="100" cy="102" r="3" fill="#00BFFF" opacity="1" />
  <circle cx="75" cy="120" r="2" fill="#00D4FF" opacity="0.8" />
  <circle cx="125" cy="120" r="2" fill="#00D4FF" opacity="0.8" />
  <circle cx="100" cy="150" r="2.5" fill="#00BFFF" opacity="0.9" />

