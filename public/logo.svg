  />

  <!-- Inner wave detail -->
  <path
    d="M 100 65
       C 90 68, 85 75, 85 85
       C 85 92, 90 97, 100 98
       C 90 99, 85 105, 85 115
       C 85 125, 90 132, 100 138"
