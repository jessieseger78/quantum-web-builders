<svg viewBox="0 0 200 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="1" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="shieldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2A52" />
      <stop offset="50%" stop-color="#0A1F44" />
      <stop offset="100%" stop-color="#071833" />
